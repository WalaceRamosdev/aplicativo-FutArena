<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded Background -->
  <rect width="512" height="512" rx="112" fill="#131313" />
  
  <defs>
    <!-- Modern Gradients -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff87" />
      <stop offset="50%" stop-color="#00dfa2" />
      <stop offset="100%" stop-color="#ffd700" />
    </linearGradient>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a0a0a0" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Scale and Center the Logo elements (scale to 85% to fit nicely with breathing room) -->
  <g transform="translate(38.4, 38.4) scale(0.85)">
    <!-- Glowing Stadium/Arena Arcs -->
    <circle cx="256" cy="256" r="230" fill="none" stroke="url(#glowGrad)" stroke-width="8" opacity="0.2" />
    <circle cx="256" cy="256" r="210" fill="none" stroke="url(#glowGrad)" stroke-width="4" stroke-dasharray="15 10" opacity="0.4" />
    
    <!-- Outer Stadium Ring Arcs representing "Arena" -->
    <path d="M 80 256 A 176 176 0 0 1 432 256" fill="none" stroke="url(#glowGrad)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />
    <path d="M 100 256 A 156 156 0 0 0 412 256" fill="none" stroke="#ffd700" stroke-width="6" stroke-linecap="round" opacity="0.8" />

    <!-- The Soccer Ball -->
    <g transform="translate(256, 256) scale(0.85)">
      <!-- Ball Base -->
      <circle cx="0" cy="0" r="120" fill="url(#ballGrad)" stroke="#111111" stroke-width="8" />
      
      <!-- Soccer Ball Pentagons & Hexagons Pattern -->
      <polygon points="0,-35 33,-11 20,28 -20,28 -33,-11" fill="#111111" stroke="#111111" stroke-width="2" />
      
      <!-- Seams -->
      <line x1="0" y1="-35" x2="0" y2="-75" stroke="#111111" stroke-width="8" stroke-linecap="round" />
      <polygon points="0,-75 45,-100 78,-70 53,-35 33,-11" fill="none" stroke="#111111" stroke-width="8" />
      <polygon points="0,-75 -45,-100 -78,-70 -53,-35 -33,-11" fill="none" stroke="#111111" stroke-width="8" />
      
      <line x1="33" y1="-11" x2="70" y2="-15" stroke="#111111" stroke-width="8" stroke-linecap="round" />
      <polygon points="70,-15 108,-40 120,5 88,40 53,-35" fill="none" stroke="#111111" stroke-width="8" />
      
      <line x1="20" y1="28" x2="45" y2="65" stroke="#111111" stroke-width="8" stroke-linecap="round" />
      <polygon points="45,65 75,100 25,115 0,80 20,28" fill="none" stroke="#111111" stroke-width="8" />
      
      <line x1="-20" y1="28" x2="-45" y2="65" stroke="#111111" stroke-width="8" stroke-linecap="round" />
      <polygon points="-45,65 -75,100 -25,115 0,80 -20,28" fill="none" stroke="#111111" stroke-width="8" />
      
      <line x1="-33" y1="-11" x2="-70" y2="-15" stroke="#111111" stroke-width="8" stroke-linecap="round" />
      
      <!-- Connections -->
      <path d="M 0,-75 L 0,-120 M 70,-15 L 115,-30 M 45,65 L 85,85 M -45,65 L -85,85 M -70,-15 L -115,-30" stroke="#111111" stroke-width="8" />
    </g>

    <!-- Glowing Crown/Stars -->
    <g transform="translate(256, 60)" filter="url(#neonGlow)">
      <polygon points="0,-15 5,-3 17,-3 8,5 11,17 0,9 -11,17 -8,5 -17,-3 -5,-3" fill="#ffd700" />
      <polygon points="-50,0 -47,10 -37,10 -45,17 -42,27 -50,20 -58,27 -55,17 -63,10 -53,10" fill="#ffd700" opacity="0.8" />
      <polygon points="50,0 53,10 63,10 55,17 58,27 50,20 42,27 45,17 37,10 47,10" fill="#ffd700" opacity="0.8" />
    </g>
  </g>
</svg>
